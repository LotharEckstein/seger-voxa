<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOXA AI - Seger Support</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <style>
        /* Media Gallery in Error Overlay */
        .error-media-section {
            padding: 1rem;
            border-top: 2px solid var(--voxa-teal, #4A9B9B);
        }

        .error-media-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--voxa-teal, #4A9B9B);
            margin-bottom: 0.75rem;
        }

        .media-gallery {
            display: flex;
            gap: 0.75rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .media-card {
            flex-shrink: 0;
            width: 180px;
            background: #F9F9F9;
            border: 1px solid #E0E0E0;
            cursor: pointer;
            transition: box-shadow 0.2s;
        }

        .media-card:hover {
            box-shadow: 0 2px 12px rgba(74, 155, 155, 0.3);
        }

        .media-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            display: block;
        }

        .media-card-label {
            padding: 0.5rem;
            font-size: 0.75rem;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Chat inline media */
        .chat-media-card {
            margin-top: 0.5rem;
            max-width: 250px;
            background: #F0F0F0;
            border: 1px solid #E0E0E0;
            cursor: pointer;
        }

        .chat-media-card img {
            width: 100%;
            height: auto;
            max-height: 180px;
            object-fit: cover;
            display: block;
        }

        .chat-media-label {
            padding: 0.4rem 0.6rem;
            font-size: 0.7rem;
            color: #666;
        }

        /* Lightbox for full-size image */
        .media-lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .media-lightbox.active {
            display: flex;
        }

        .media-lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <span class="logo-voxa">VOXA</span>
            <span class="logo-ai">AI</span>
        </div>
        <nav class="nav-menu">
            <a class="nav-item" href="/demo.html">Uptime Insurance</a>
            <a class="nav-item">Support Calendar</a>
            <a class="nav-item">Conversation Log</a>
        </nav>
    </header>
    <!-- Main Container -->
    <main class="main-container">
        <!-- Hero Section -->
        <section class="hero-section">
            <img src="/SegerVoxaHero.jpg" alt="Seger Support" class="hero-image" style="object-position: center 20%;">
            
            <!-- Status Indicator (shown during call) -->
            <div class="status-indicator" id="statusIndicator">
                <div class="status-orb" id="statusOrb"></div>
                <span class="status-text" id="statusText">Bereit</span>
            </div>
        </section>
        <!-- Button Bar -->
        <div class="button-bar" id="buttonBar">
            <button class="btn btn-teal" id="callVoxaBtn">CALL VOXA</button>
        </div>
    </main>
    <!-- Chat Panel -->
    <div class="chat-panel" id="chatPanel">
        <div class="chat-header">
            <img src="/SegerVoxaHero.jpg" alt="Voxa" class="chat-avatar">
            <span class="chat-title">Chat with Voxa</span>
            <button class="chat-close" id="chatCloseBtn">×</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-container">
            <input type="text" class="chat-input" id="chatInput" placeholder="Type your message...">
            <button class="chat-send" id="chatSendBtn">Send</button>
        </div>
    </div>
    <!-- Error Code Overlay -->
    <div class="error-overlay" id="errorOverlay">
        <div class="error-header">
            <img src="/SegerVoxaHero.jpg" alt="Error" class="error-avatar">
            <span class="error-title" id="errorTitle">SW Error System</span>
            <button class="error-close" id="errorCloseBtn">×</button>
        </div>
        <div class="error-content" id="errorContent">
            <table class="error-table" id="errorTable"></table>
        </div>
    </div>
    <!-- Sensor Alert Banner -->
    <div class="sensor-alert-banner" id="sensorAlertBanner">
        <span id="sensorAlertText"></span>
        <button class="dismiss-btn" id="sensorAlertDismiss">OK</button>
    </div>
    <!-- Sensor Panel -->
    <div class="sensor-panel" id="sensorPanel">
        <div class="sensor-panel-header">
            <span class="sensor-panel-title">Sensor Monitor</span>
            <button class="sensor-panel-close" id="sensorPanelClose">&times;</button>
        </div>
        <div class="sensor-machines" id="sensorMachines"></div>
        <div class="sensor-demo-buttons">
            <button class="demo-btn danger" data-scenario="overheat">Overheat</button>
            <button class="demo-btn danger" data-scenario="vibration_spike">Vibration</button>
            <button class="demo-btn danger" data-scenario="pressure_drop">Pressure Drop</button>
            <button class="demo-btn danger" data-scenario="error_code">Error Code</button>
            <button class="demo-btn safe"   data-scenario="all_clear">All Clear</button>
        </div>
    </div>
    <!-- Media Lightbox -->
    <div class="media-lightbox" id="mediaLightbox">
        <img id="lightboxImage" src="" alt="Full size">
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
